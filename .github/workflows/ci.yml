name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Compile Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Unit & integration tests
        run: |
          node --import tsx --test \
            src/verifier/*.test.ts \
            src/cognition/*.test.ts \
            src/core/*.test.ts \
            src/approval/*.test.ts \
            src/auth/*.test.ts \
            src/observability/*.test.ts \
            src/llm/provider.test.ts \
            src/knowledge/*.test.ts \
            src/planner/*.test.ts \
            src/db/*.test.ts \
            src/plugins/*.test.ts \
            src/worker/*.test.ts \
            src/streaming/*.test.ts \
            src/clarification/*.test.ts \
            src/decomposer/*.test.ts \
            src/scheduler/*.test.ts \
            src/user-memory/*.test.ts \
            src/vision/*.test.ts \
            src/handlers/*.test.ts \
            src/sandbox/*.test.ts

  osint-tests:
    name: OSINT Module Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Install OSINT system dependencies
        run: sudo apt-get update && sudo apt-get install -y whois dnsutils openssl
      - name: OSINT unit tests
        run: node --import tsx --test src/osint/osint.test.ts

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: API tests
        run: node --import tsx --test src/api/server.test.ts src/api/sanitize.test.ts src/api/security.test.ts

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: E2E tests
        run: |
          mkdir -p artifacts
          node --import tsx --test src/e2e.integration.test.ts
