<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Agent Orchestrator</title>
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.mono{font-family:"SF Mono",Monaco,"Courier New",monospace}
.msg-in{animation:slideIn .2s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{animation:spin .7s linear infinite;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;width:14px;height:14px;display:inline-block}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%}
details>summary{list-style:none;cursor:pointer;user-select:none}
details>summary::-webkit-details-marker{display:none}
.typing-dot{animation:typing 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{opacity:.3}30%{opacity:1}}
textarea{resize:none}
textarea::-webkit-scrollbar,.scroll-thin::-webkit-scrollbar{width:6px;height:6px}
textarea::-webkit-scrollbar-thumb,.scroll-thin::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
.dark textarea::-webkit-scrollbar-thumb,.dark .scroll-thin::-webkit-scrollbar-thumb{background:#374151}
.prose-msg{line-height:1.6}
.prose-msg p+p{margin-top:.75em}
.prose-msg pre{position:relative;background:#0d1117;color:#c9d1d9;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;font-size:12px}
.prose-msg code:not(pre code){background:#f3f4f6;padding:1px 5px;border-radius:4px;font-size:.9em;font-family:"SF Mono",Monaco,monospace}
.dark .prose-msg code:not(pre code){background:#1f2937}
.prose-msg a{color:#2563eb;text-decoration:underline}
.prose-msg h1,.prose-msg h2,.prose-msg h3{font-weight:600;margin:12px 0 6px}
.prose-msg h1{font-size:1.25em}.prose-msg h2{font-size:1.15em}
.prose-msg ul,.prose-msg ol{margin:6px 0;padding-left:20px}
.prose-msg li{margin:2px 0}
.prose-msg table{border-collapse:collapse;margin:8px 0}
.prose-msg th,.prose-msg td{border:1px solid #e5e7eb;padding:4px 8px;font-size:12px}
.dark .prose-msg th,.dark .prose-msg td{border-color:#374151}
.copy-btn{position:absolute;top:6px;right:6px;padding:2px 8px;font-size:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:4px;color:#8b949e;cursor:pointer;opacity:0;transition:opacity .15s}
.prose-msg pre:hover .copy-btn{opacity:1}
.copy-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.copy-btn.copied{color:#3fb950}
.event-row{cursor:pointer;transition:background .1s;border-radius:4px;padding:2px 4px}
.event-row:hover{background:rgba(0,0,0,.04)}
.dark .event-row:hover{background:rgba(255,255,255,.06)}
.inline-event{animation:slideIn .2s ease-out}
.slash-menu{position:absolute;bottom:calc(100% + 4px);left:0;right:0;max-height:200px;overflow-y:auto}
.suggest-drop{position:absolute;bottom:calc(100% + 4px);left:0;right:0;max-height:150px;overflow-y:auto}
.drawer{transform:translateX(100%);transition:transform .22s ease}
.drawer.open{transform:translateX(0)}
.resize-handle{width:5px;cursor:col-resize;background:transparent;transition:background .15s;flex-shrink:0}
.resize-handle:hover,.resize-handle.active{background:rgba(59,130,246,.4)}
.stage-pill{padding:2px 8px;border-radius:9999px;font-size:11px;transition:all .3s}
.skeleton{background:linear-gradient(90deg,#f3f4f6 25%,#e5e7eb 50%,#f3f4f6 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
.dark .skeleton{background:linear-gradient(90deg,#1f2937 25%,#374151 50%,#1f2937 75%);background-size:200% 100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.lightbox{backdrop-filter:blur(8px)}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.progress-track{height:3px;transition:width .4s ease}
.msg-time{font-size:10px;opacity:0;transition:opacity .15s}
.msg-in:hover .msg-time,.msg-in:hover .msg-actions{opacity:1}
.msg-actions{opacity:0;transition:opacity .15s}
.msg-actions button{padding:2px 6px;border-radius:4px;font-size:10px;transition:background .1s}
.msg-actions button:hover{background:rgba(0,0,0,.06)}
.dark .msg-actions button:hover{background:rgba(255,255,255,.08)}
.sidebar{transition:width .2s ease,min-width .2s ease,opacity .2s ease,transform .2s ease;overflow:hidden}
.sidebar.collapsed{width:0!important;min-width:0!important;padding:0!important;border:none!important;opacity:0;pointer-events:none}
.right-panel{transition:width .2s ease,min-width .2s ease,opacity .2s ease,transform .2s ease;overflow:hidden}
.right-panel.collapsed{width:0!important;min-width:0!important;padding:0!important;border:none!important;opacity:0;pointer-events:none}
.resize-handle.panel-hidden{display:none!important}
.drag-handle{cursor:grab;opacity:0;transition:opacity .1s}
.group:hover .drag-handle{opacity:.5}
.drag-handle:active{cursor:grabbing}
.drag-over{border-top:2px solid #3b82f6!important}
@media(max-width:1024px){
  .sidebar{position:absolute;z-index:40;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);opacity:1;pointer-events:auto;width:16rem!important}
  .sidebar.collapsed{transform:translateX(-100%)}
  .right-panel.collapsed{display:none!important}
  .right-panel.open{display:flex!important;position:absolute;inset:0;z-index:30;width:100%!important;opacity:1;pointer-events:auto}
}
@media(max-width:640px){
  .msg-actions{opacity:1}
  .msg-time{opacity:1}
}
</style>
</head>
