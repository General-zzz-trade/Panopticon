<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Panopticon</title>
<meta name="theme-color" content="#0a0e17">
<meta name="apple-mobile-web-app-capable" content="yes">
<script>window.tailwind={config:{darkMode:'class',theme:{extend:{colors:{osint:{bg:'#0a0e17',panel:'#0d1321',card:'#111827',border:'#1e293b',accent:'#00ff88',accentDim:'#00cc6a',cyan:'#06b6d4',amber:'#f59e0b',red:'#ef4444',text:'#e2e8f0',muted:'#64748b',input:'#1a2332'}}}}}}</script>
<script src="https://cdn.tailwindcss.com?plugins="></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;background:#0a0e17}
body{font-family:'Inter',system-ui,sans-serif;color:#e2e8f0}
.mono,.font-mono{font-family:'JetBrains Mono',monospace}
.msg-in{animation:slideIn .2s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 4px rgba(0,255,136,.3)}50%{box-shadow:0 0 12px rgba(0,255,136,.6)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
@keyframes typing{0%,60%,100%{opacity:.3}30%{opacity:1}}
.spinner{animation:spin .7s linear infinite;border:2px solid transparent;border-top-color:#00ff88;border-radius:50%;width:14px;height:14px;display:inline-block}
.glow-green{box-shadow:0 0 8px rgba(0,255,136,.3)}
.glow-cyan{box-shadow:0 0 8px rgba(6,182,212,.3)}
.glow-red{box-shadow:0 0 8px rgba(239,68,68,.3)}
.pulse-dot{animation:pulse-glow 2s ease-in-out infinite}
.text-accent{color:#00ff88}
.bg-accent{background:#00ff88}
.border-accent{border-color:#00ff88}
textarea{resize:none}
textarea::-webkit-scrollbar,.scroll-thin::-webkit-scrollbar{width:4px;height:4px}
textarea::-webkit-scrollbar-thumb,.scroll-thin::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
textarea::-webkit-scrollbar-track,.scroll-thin::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
::-webkit-scrollbar-track{background:#0a0e17}
.prose-msg{line-height:1.6}
.prose-msg p+p{margin-top:.75em}
.prose-msg pre{position:relative;background:#0d1117;color:#00ff88;padding:12px;border-radius:6px;overflow-x:auto;margin:8px 0;font-size:12px;border:1px solid #1e293b}
.prose-msg code:not(pre code){background:#1a2332;padding:1px 5px;border-radius:3px;font-size:.85em;font-family:'JetBrains Mono',monospace;color:#06b6d4}
.prose-msg a{color:#06b6d4;text-decoration:underline}
.prose-msg h1,.prose-msg h2,.prose-msg h3{font-weight:600;margin:12px 0 6px;color:#00ff88}
.prose-msg ul,.prose-msg ol{margin:6px 0;padding-left:20px}
.prose-msg li{margin:2px 0}
.prose-msg table{border-collapse:collapse;margin:8px 0}
.prose-msg th,.prose-msg td{border:1px solid #1e293b;padding:4px 8px;font-size:12px}
.copy-btn{position:absolute;top:6px;right:6px;padding:2px 8px;font-size:10px;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.2);border-radius:4px;color:#00ff88;cursor:pointer;opacity:0;transition:opacity .15s}
.prose-msg pre:hover .copy-btn{opacity:1}
.copy-btn:hover{background:rgba(0,255,136,.2)}
.copy-btn.copied{color:#06b6d4}
.osint-grid{display:grid;gap:1px;background:#1e293b}
.osint-grid>*{background:#0d1321}
.terminal-cursor{display:inline-block;width:8px;height:16px;background:#00ff88;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.risk-critical{background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(239,68,68,.05));border-color:rgba(239,68,68,.3)}
.risk-high{background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(249,115,22,.05));border-color:rgba(249,115,22,.3)}
.risk-medium{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.05));border-color:rgba(245,158,11,.3)}
.risk-low{background:linear-gradient(135deg,rgba(0,255,136,.1),rgba(0,255,136,.03));border-color:rgba(0,255,136,.2)}
</style>
</head>
<body class="h-screen overflow-hidden">
  <div id="root" class="h-full"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
