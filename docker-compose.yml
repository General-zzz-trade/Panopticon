version: "3.8"
services:
  panopticon:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - AGENT_API_AUTH=false
      # Optional: LLM for AI-enhanced analysis
      - LLM_PLANNER_PROVIDER=${LLM_PLANNER_PROVIDER:-}
      - LLM_PLANNER_API_KEY=${LLM_PLANNER_API_KEY:-}
      - LLM_PLANNER_MODEL=${LLM_PLANNER_MODEL:-}
      - LLM_PLANNER_BASE_URL=${LLM_PLANNER_BASE_URL:-}
      # Optional: GitHub token for higher rate limits
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - panopticon-data:/app/artifacts
      - panopticon-db:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  panopticon-data:
  panopticon-db:
